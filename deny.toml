[advisories]
# Deny crates with known security vulnerabilities
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
version = 2
# Allow common permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "MPL-2.0",
    "Unicode-3.0",
]

[bans]
# Deny multiple versions of the same crate to keep the dependency tree clean
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
